   <script>
        (function () {
            const $viewSwitcher = document.getElementById('viewSwitcher');
            const $tabContent   = document.getElementById('floorTabContent');
            const $searchInput  = document.getElementById('searchRooms');
            
            
            
            // --- helpers per-card (musí být mimo click callback, aby šly použít i jinde) ---
function _getModeFromCard(card) {
  const w = card.querySelector('[data-name="Control-IN"]');
  const img = w?.querySelector('img.ButtonsGrid_icon__7wI7o');
  if (!w || !img) return 'Cooling';

  const seq = (w.dataset.iconSeq || '')
    .split(',')
    .map(s => s.trim())
    .filter(Boolean);

  const textSeq = (w.dataset.textSeq || '')
    .split(',')
    .map(s => s.trim())
    .filter(Boolean);

  if (seq.length) {
    const curSrc = img.getAttribute('src') || '';
    const idx = seq.indexOf(curSrc);
    if (idx >= 0 && textSeq[idx]) return textSeq[idx];
  }

  return 'Cooling';
}

            function _getRequiredThermLabel(card) {
              const mode = _getModeFromCard(card);
              return (mode === 'Heating')
                ? 'Required-Heat-Therm-AOUT'
                : 'Required-Cool-Therm-AOUT';
            }
            
            function _formatActualTempFromHundredths(v) {
              // v: integer ve setinách stupně (např. 2200 => 22.0 °C)
              const n = (typeof v === 'number') ? v : parseInt(String(v ?? '').trim(), 10);
              if (Number.isNaN(n)) return null;
              if (n > 10000) return 'ERROR';
              return (n / 100).toFixed(1) + ' \u00B0C'; // "22.0 °C"
            }

            function _setClimateAccent(ring, color) {
                if (!ring) return;
                ring.style.setProperty('--climate-accent', color);
                const layout = ring.closest('.room-center-layout');
                if (layout) layout.style.setProperty('--climate-accent', color);
            }

            function _applyElanConfReg(card, modeText) {
              const infoEl = card.querySelector('.CenterText_infoText__2QkjS span');
              const ring = card.querySelector('.CenterText_wrapper__fxp5g');
              if (!infoEl || !ring) return;
              const mode = String(modeText || '').trim();
              infoEl.textContent = mode;
              if (mode === 'Heating') {
                _setClimateAccent(ring, '#ff7f4e');
              } else if (mode === 'Auto') {
                _setClimateAccent(ring, '#198754');
              } else if (mode === 'Off') {
                _setClimateAccent(ring, '#6c757d');
              } else {
                _setClimateAccent(ring, '#1e88e5');
              }
            }

            function _syncElanConfRegChip(card, modeText) {
              const wrapper = card.querySelector('.room-climate-control[data-name="Conf-reg"]')
                || card.querySelector('[data-name="Conf-reg"].room-climate-chip');
              if (!wrapper) return;
              const img = wrapper.querySelector('img.ButtonsGrid_icon__7wI7o');
              const labelEl = wrapper.querySelector('.ButtonsGrid_button_label__1d6gb');
              const seq = (wrapper.dataset.iconSeq || '').split(',').map(s => s.trim()).filter(Boolean);
              const textSeq = (wrapper.dataset.textSeq || '').split(',').map(s => s.trim()).filter(Boolean);
              const idxMap = {
                'Cooling': 0,
                'Heating': 1,
                'Auto': 2,
                'Off': 3
              };
              const idx = idxMap[String(modeText || '').trim()] ?? 0;
              if (img && seq[idx]) img.setAttribute('src', seq[idx]);
              if (labelEl && textSeq[idx]) labelEl.textContent = textSeq[idx];
              _applyElanConfReg(card, textSeq[idx] || modeText);
            }
            
            function _applyCircleColor(card) {
                const ring = card.querySelector('.CenterText_wrapper__fxp5g');
                if (!ring) return;
                if (card.dataset.autoMode === '1') {
                _setClimateAccent(ring, '#198754');
                return;
            }

            const mode = _getModeFromCard(card);

            if (mode === 'Heating') {
                _setClimateAccent(ring, '#ff7f4e');
            } else if (mode === 'Cooling') {
                _setClimateAccent(ring, '#1e88e5');
            } else if (mode === 'Off') {
                _setClimateAccent(ring, '#6c757d');
            } else {
                _setClimateAccent(ring, '#1e88e5');
            }
        }
            
            function _applySetTempToCard(card, deg) {
              // 1) text uprostřed (Set temp.)
              const center = card.querySelector('.CenterText_text__2a1zA span');
              if (center){
                if(deg < 1200) {
                  center.textContent = `${Number(deg).toFixed(1)}°C`;
                }else{
                  center.textContent = `ERROR`;
                }
              };

              // 2) dataset (ať máš hodnotu uloženou i pro +/-)
              card.dataset.targetTemp = String(deg);

              // 3) srovnání active položky v přepínači (15/20/24/28), AUTO necháme být
              const box = card.querySelector('.Button_Button__multiple_switch__2IRpL');
              if (!box) return;

              const items = Array.from(box.children);
              if (!items.length) return;

              // najdi nejbližší teplotní položku (ignoruj AUTO)
              let best = null;
              let bestDiff = Infinity;

              for (const it of items) {
                const t = it.querySelector('span')?.textContent?.trim() || '';
                if (t.toUpperCase() === 'AUTO') continue;
                const m = t.replace(',', '.').match(/-?\d+(\.\d+)?/);
                if (!m) continue;
                const n = parseFloat(m[0]);
                const d = Math.abs(n - deg);
                if (d < bestDiff) { bestDiff = d; best = it; }
              }

              if (!best) return;

              // nastav active/inactive
              items.forEach(it => {
                it.classList.remove('Button_Button__item_elipse_active__LE4mE');
                it.classList.add('Button_Button__item_elipse_inactive__dQaXQ');
              });
              best.classList.remove('Button_Button__item_elipse_inactive__dQaXQ');
              best.classList.add('Button_Button__item_elipse_active__LE4mE');
            }
            
            // malý helper
            const el = (tag, cls, html) => {
                const e = document.createElement(tag);
                if (cls) e.className = cls;
                if (html != null) e.innerHTML = html;
                return e;
            };
            
            function renderTabs(floors) {
                $viewSwitcher.innerHTML = '';
                floors.forEach((f, idx) => {
                    const li = el('li', 'nav-item');
                    li.setAttribute('role', 'presentation');
                    const btn = el('button', 'px-4 py-1 nav-link rounded-pill' + (idx === 0 ? ' active' : ''));
                    btn.type = 'button';
                    btn.id   = `floor-tab-${f.fid}`;
                    btn.dataset.bsToggle = 'pill';
                    btn.dataset.bsTarget = `#floor-pane-${f.fid}`;
                    btn.setAttribute('role', 'tab');
                    btn.setAttribute('aria-controls', `floor-pane-${f.fid}`);
                    btn.setAttribute('aria-selected', idx === 0 ? 'true' : 'false');
                    btn.dataset.fid = f.fid;               // uložíme fid
                    btn.textContent = f.fname || `Floor ${f.fid}`;
                    li.appendChild(btn);
                    $viewSwitcher.appendChild(li);
                });
            }

function getStatusClass(status) {
    switch (status) {
        case 'Free': return 'success';

function renderPanes(floors) {
    $tabContent.innerHTML = '';

    floors.forEach((f, idx) => {
        const pane = el('div', 'tab-pane fade' + (idx === 0 ? ' show active' : ''));
        pane.id = `floor-pane-${f.fid}`;
        pane.setAttribute('role', 'tabpanel');
        pane.dataset.fid = f.fid;

        const row = el('div', 'rooms-grid');

        if (Array.isArray(f.rooms) && f.rooms.length) {
            f.rooms.forEach(r => row.appendChild(roomCard(r, r.gateway || 'bus')));
        } else {
            const empty = el('div', 'text-center text-muted my-4');
            empty.style.gridColumn = '1 / -1';
            empty.textContent = 'No rooms';
            row.appendChild(empty);
        }

        pane.appendChild(row);
        $tabContent.appendChild(pane);
    });
}
            
            function wireSearch() {
                if (!$searchInput) return;
                $searchInput.addEventListener('input', () => {
                    const q = $searchInput.value.trim().toLowerCase();
                    const activePane = $tabContent.querySelector('.tab-pane.active');
                    if (!activePane) return;
                    activePane.querySelectorAll('.room-panel').forEach(col => {
                        const nameEl = col.querySelector('[name="roomName"]');
                        const name = ((nameEl ? nameEl.textContent : '') || '').toLowerCase();
                        col.style.display = name.includes(q) ? '' : 'none';
                    });
                });
            }
            
            async function loadFloors() {
                const res = await fetch('/api/rooms/floors', { cache: 'no-store' });
                if (!res.ok) throw new Error('Floor reading error');
                const data = await res.json();  // [{fid,fname,rooms:[{rid,rname}]}]
                renderTabs(data);
                renderPanes(data);

                // Open the first floor that contains an eLAN room (e.g. Floor 007).
                const elanFloor = data.find(f =>
                  Array.isArray(f.rooms) && f.rooms.some(r => String(r.gateway || '').toLowerCase() === 'elan')
                );
                if (elanFloor) {
                  const tabBtn = document.querySelector(`#floor-tab-${elanFloor.fid}`);
                  if (tabBtn && window.bootstrap?.Tab) {
                    window.bootstrap.Tab.getOrCreateInstance(tabBtn).show();
                  }
                }

                const visiblePane = document.querySelector('#floorTabContent .tab-pane.active');
                if (visiblePane) {
                  try {
                    await initializeIconStates({ initial: true });
                  } catch (e) {
                    console.warn('initial pane sync', e);
                  }
                }

                return true;
            }
            
            function _slugLabel(lbl) {
              return (lbl || "")
                .trim()
                .toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // odstraň diakritiku pro jistotu
                .replace(/[^a-z0-9]+/g, '-')                     // nepovolené znaky -> pomlčka
                .replace(/^-+|-+$/g, '');
            }

            function _findRidFromWrapper(wrapper) {
              const card = wrapper.closest('.card[data-rid]');
              if (card && card.dataset.rid) return card.dataset.rid;
              const panel = wrapper.closest('.room-panel[data-rid]');
              if (panel && panel.dataset.rid) return panel.dataset.rid;
              return null;
            }

            async function _publishState(rid, labelSlug, valueInt) {
              try {
                const res = await fetch('/api/mqtt/publish', {
                  method: 'POST',
                  headers: {'Content-Type':'application/json'},
                  body: JSON.stringify({ rid, label: labelSlug, value: valueInt })
                });
                // nechci blokovat UI — jen zaloguju
                const out = await res.json().catch(()=> ({}));
                if (!res.ok || !out.ok) console.warn('MQTT publish failed', out);
              } catch (err) {
                console.warn('MQTT publish error', err);
              }
            }
            
             // Počkej, až se vykreslí ikony po loadFloors/renderPanes
            function waitForIconWrappers(cb, tries = 60) {  // ~6 sekund maximálně
              const ok = document.querySelector('#floorTabContent .tab-pane.active .ButtonsGrid_button_wrapper__2NBWx');
              if (ok) { cb(); return; }
              if (tries <= 0) return;
              setTimeout(() => waitForIconWrappers(cb, tries - 1), 100);
            }

            function _setPanePending(pane) {
              if (!pane) return;
                pane.querySelectorAll('.card').forEach(card => {
                card.classList.add('icons-pending');
              });
            }

            function _clearPanePending(pane) {
              if (!pane) return;
                pane.querySelectorAll('.card').forEach(card => {
                card.classList.remove('icons-pending');
              });
            }

            
async function startRoomsOnce() {
  if (window.__rooms_init_done__) return;
  window.__rooms_init_done__ = true;

  await loadFloors();
  wireSearch();
  wireIconToggles();
  startOverviewPolling();
}

            document.addEventListener('DOMContentLoaded', () => { startRoomsOnce(); });

              function _parseTempFromText(s) {

                if (!s) return null;
                const m = String(s).replace(',', '.').match(/-?\d+(\.\d+)?/);
                return m ? parseFloat(m[0]) : null;
              }

              function _formatTemp(val) {

              function _formatSetTempFromTenths(v) {
                // v: integer v desetinách (např. 280 => 28.0°C)
                const n = (typeof v === 'number') ? v : parseInt(String(v ?? '').trim(), 10);
                if (Number.isNaN(n)) return null;
                return (n / 10).toFixed(1) + '°C'; // bez mezery, stejně jako "28.0°C"
              }
              
              function _toTenthsInt(val) {

  return Array.from(activePane.querySelectorAll('.ButtonsGrid_button_wrapper__2NBWx'))
    .filter(w => !_isElanSkippedStateWrapper(w));
}

function _stateBatchItemsForPane(pane) {
  if (!pane) return [];
  const items = [];
  const seen = new Set();
  const add = (rid, label) => {
    const ridStr = String(rid || '').trim();
    const labelStr = String(label || '').trim();
    if (!ridStr || !labelStr) return;
    const k = `${ridStr}|${labelStr}`;
    if (seen.has(k)) return;
    seen.add(k);
    items.push({ rid: ridStr, label: labelStr });
  };

  for (const card of pane.querySelectorAll('.card[data-rid][data-gateway="elan"]')) {
    const rid = card.dataset.rid;
    if (!rid) continue;
    for (const label of ELAN_POLL_LABELS) add(rid, label);
  }

  for (const w of pane.querySelectorAll('.ButtonsGrid_button_wrapper__2NBWx')) {
    if (!_isOverviewBatchWrapper(w)) continue;
    const d = _descriptorFromWrapper(w);
    if (d) add(d.rid, d.labelSlug);
  }
  return items;
}

async function _fetchStateBatchLookup(pane, attempt = 0) {
  const items = _stateBatchItemsForPane(pane);
  if (!items.length) return { lookup: new Map(), results: [] };

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), OVERVIEW_STATE_BATCH_TIMEOUT_MS);
  let out = null;
  try {
    const res = await fetch('/api/mqtt/state-batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      cache: 'no-store',
      signal: controller.signal,
      body: JSON.stringify({ items })
    });
    clearTimeout(timer);
    out = await res.json();
    if (!res.ok || !out.ok) {
      if (attempt < 1) {
        await new Promise((r) => setTimeout(r, 800));
        return _fetchStateBatchLookup(pane, attempt + 1);
      }
      console.warn('state-batch failed', out);
      return { lookup: new Map(), results: [] };
    }
  } catch (e) {
    clearTimeout(timer);
    if (attempt < 1) {
      await new Promise((r) => setTimeout(r, 800));
      return _fetchStateBatchLookup(pane, attempt + 1);
    }
    console.warn('state-batch error', e);
    return { lookup: new Map(), results: [] };
  }

  const key = (r, l) => `${String(r)}|${String(l)}`;
  const lookup = new Map((out.results || []).map(x => [key(x.rid, x.label), x]));

  return { lookup, results: out.results || [] };
}

function _applyElanFanStatesFromLookup(card, lookup) {
  const ridKey = String(card.dataset.rid);
  const fanStates = {};
  for (const fn of ['Fan-off', 'Fan-1', 'Fan-2', 'Fan-3']) {
    const v = _lookupVal(lookup, ridKey, fn);
    if (v != null) fanStates[fn] = Number(v);
  }
  let activeName = null;
  if (fanStates['Fan-off'] === 1) activeName = 'Fan-off';
  else if (fanStates['Fan-1'] === 1) activeName = 'Fan-1';
  else if (fanStates['Fan-2'] === 1) activeName = 'Fan-2';
  else if (fanStates['Fan-3'] === 1) activeName = 'Fan-3';
  else if (fanStates['Fan-off'] === 0) activeName = 'Manual';
  if (activeName) _applyElanFanState(card, activeName);
}

function _markPanePending(pane) {
  if (!pane) return;
  pane.querySelectorAll('.card[data-rid]:not([data-room-synced])').forEach(card => {

}

function _finishPaneSync(pane) {
  if (!pane) return;
  pane.querySelectorAll('.card[data-rid]').forEach(card => {
    card.dataset.roomSynced = '1';
    card.classList.remove('icons-pending');
  });
}

function _clearPanePendingOnly(pane) {
  if (!pane) return;
  pane.querySelectorAll('.card[data-rid].icons-pending').forEach(card => {
    card.classList.remove('icons-pending');
  });
}

function _lookupVal(lookup, rid, label) {
  const rec = lookup.get(`${String(rid)}|${String(label)}`);
  if (!rec || rec.error) return null;
  return rec.value;
}

function _applyServiceChipFromValue(wrapper, valueRaw) {
  if (!wrapper) return;
  const img = wrapper.querySelector('img.ButtonsGrid_icon__7wI7o');
  if (!img) return;
  const n = parseInt(String(valueRaw ?? '').trim(), 10);
  if (Number.isNaN(n)) return;
  const iconOn = wrapper.dataset.iconOn || 'assets/img/overview-icon-active.svg';
  const iconOff = wrapper.dataset.iconOff || img.getAttribute('src') || '';
  if (!img.dataset.origSrc) img.dataset.origSrc = iconOff;
  const isOn = n >= 1;
  img.setAttribute('src', isOn ? iconOn : iconOff);
  _setServiceChipActive(wrapper, isOn);
}

/** Direct sync of visible eLAN card widgets (DND, temps, mode) from state-batch. */
function _syncElanRoomCardFromLookup(card, lookup) {
  const rid = card?.dataset?.rid;
  if (!rid || (card.dataset.gateway || '').toLowerCase() !== 'elan') return;

  _applyServiceChipFromValue(
    card.querySelector('.room-service-chip[data-name="DND"]'),
    _lookupVal(lookup, rid, 'DND')
  );
  _applyServiceChipFromValue(
    card.querySelector('.room-service-chip[data-name="MUR"]'),
    _lookupVal(lookup, rid, 'MUR')
  );

  const tempAll = _lookupVal(lookup, rid, 'Temp-all');
  if (tempAll != null) {
    const outText = _formatActualTempFromHundredths(tempAll);
    const el = card.querySelector('.room-climate-panel__actual .UpDownControl_text__2Tmvq span')
      || card.querySelector('.UpDownControl_text__2Tmvq span');
    if (outText != null && el) el.textContent = outText;
  }

  const tempSta = _lookupVal(lookup, rid, 'Temp-sta');
  if (tempSta != null) {
    const n = parseInt(String(tempSta).trim(), 10);
    if (!Number.isNaN(n)) {
      const deg = n / 100;
      card.dataset.targetTemp = String(deg);
      const center = card.querySelector('.CenterText_text__2a1zA span');
      if (center) {
        center.textContent = deg < 1200 ? `${Number(deg).toFixed(1)}°C` : 'ERROR';
      }
      _updateTargetTempUI(card, deg);
    }
  }

  const regActRaw = _lookupVal(lookup, rid, 'Reg-act');
  const confRegRaw = _lookupVal(lookup, rid, 'Conf-reg');
  const regAct = parseInt(String(regActRaw ?? '').trim(), 10);
  const confReg = parseInt(String(confRegRaw ?? '').trim(), 10);
  let modeText = null;
  if (!Number.isNaN(regAct) && regAct === 0) {
    modeText = 'Off';
  } else if (!Number.isNaN(regAct) && regAct === 1) {
    if (confReg === 1) modeText = 'Cooling';
    else if (confReg === 2) modeText = 'Heating';
    else if (confReg === 4) modeText = 'Auto';
  }
  if (modeText) {
    _syncElanConfRegChip(card, modeText);
  }
}

/** Reliable device→UI sync for eLAN / RFTC3 cards (does not depend on hidden wrappers). */
async function _refreshElanCardsInPane(pane, lookup = null) {
  if (!pane) return false;
  const cards = Array.from(pane.querySelectorAll('.card[data-rid][data-gateway="elan"]'));
  if (!cards.length) return true;

  let map = lookup;
  if (!map) {
    const batch = await _fetchStateBatchLookup(pane);
    map = batch.lookup;
  }

  for (const card of cards) {
    _syncElanRoomCardFromLookup(card, map);
    _applyElanFanStatesFromLookup(card, map);
  }
  return true;
}
