    <section class="service-template section-expand">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-xl-8">
                    <div class="card header-color" style="margin-bottom: 24px;">
                        <h4 class="text-center header">Devices</h4>
                        <div class="card-body card-color">
                            <div>
                                <div class="table-responsive text-nowrap">
                                    <table class="table">
                                        <thead>
                                            <tr>
                                                <th class="text-start">#</th>
                                                <th scope="col">DEV EUI</th>
                                                <th scope="col">Device Type</th>
                                                <th>Description</th>
                                                <th class="text-center">Active</th>
                                                <th class="text-center" scope="col">Actions</th>

                                            <!-- Device rows will be populated here dynamically -->
                                        </tbody>
                                    </table>
                                </div>

                            <!-- Add Device Modal -->
                            <div class="modal fade" role="dialog" tabindex="-1" id="modal_add_device">
                                <div class="modal-dialog" role="document">
                                    <div class="modal-content">
                                        <div class="modal-header header-color">
                                            <h4 class="modal-title">Add Device</h4>
                                            <button class="btn-close" type="button" aria-label="Close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body">
                                            <form id="add-device-form">
                                                <div class="mb-3">
                                                    <div class="row">
                                                        <div class="col">
                                                            <label class="form-label">Device Model:</label>
                                                            <select class="form-select" name="deviceModel">
                                                                <option value="1" selected>RFTC-8</option>
                                                                <option value="2">RFATV-8</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="mb-3">
                                                    <div class="row">
                                                        <div class="col"><label class="form-label">DEV EUI:</label><input class="form-control" type="text" name="eui"></div>
                                                    </div>
                                                </div>
                                                <div class="mb-3">
                                                    <div class="row">
                                                        <div class="col"><label class="form-label">Description:</label><input class="form-control" type="text" name="description"></div>
                                                    </div>
                                                </div>
                                                <div class="mb-3" name="rfatvSettings" style="display: none;">
                                                    <label class="form-label fs-5 fw-bold mb-2">RFATV Settings</label>
                                                    <div class="mb-3">
                                                        <div class="row">
                                                            <div class="col">
                                                                <label class="form-label">Heating</label>
                                                                <select class="form-select" name="heating">
                                                                    <option value="1" selected>Enabled</option>
                                                                    <option value="2">Disabled - valve closed</option>
                                                                    <option value="3">Disabled - valve open</option>
                                                                </select>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div name="heatingSettings">
                                                        <div class="mb-3">
                                                            <div class="row">
                                                                <div class="col"><label class="form-label">Refresh interval [min]</label><input class="form-control" type="number" value="0.5" min="0.5" step="0.5" name="refresh_interval"></div>
                                                                <div class="col"><label class="form-label">Temperature hysteresis [°C]</label><input class="form-control" type="number" value="0" min="0" max="20" step="0.1" name="temperature_hysteresis"></div>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <div class="mb-3">
                                                                <div class="row">
                                                                    <div class="col">
                                                                        <div class="form-check"><input class="form-check-input" type="checkbox" id="add-device-freezingDetection" name="freezingDetection"><label class="form-check-label" for="add-device-freezingDetection">Freezing detection</label></div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div class="mb-3" name="freezingDetectionDiv" style="display: none;">
                                                                <div class="row">
                                                                    <div class="col"><label class="form-label">Freezing temperature [°C]</label><input class="form-control" type="number" value="5" min="0" max="20" step="0.1" name="freezing_temperature"></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <div class="mb-3">
                                                                <div class="row">
                                                                    <div class="col">
                                                                        <div class="form-check"><input class="form-check-input" type="checkbox" id="add-device-windowDetection" name="windowDetection"><label class="form-check-label" for="add-device-windowDetection">Window detection</label></div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div name="windowDetectionDiv" style="display: none;">
                                                                <div class="row">
                                                                    <div class="col"><label class="form-label">Window sensitivity [°C]</label><input class="form-control" type="number" value="0.4" min="0" max="20" step="0.1" name="window_sensitivity"></div>
                                                                    <div class="col"><label class="form-label">Window time [min]</label><input class="form-control" type="number" value="10" min="0" step="0.5" name="window_time"></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </form>
                                        </div>
                                        <div class="modal-footer">
                                            <button class="btn btn-light" type="button" data-bs-dismiss="modal">Close</button>
                                            <button class="btn btn-primary" type="submit" id="device-submit-btn">Add</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Edit Device Modal -->
                            <div class="modal fade" role="dialog" tabindex="-1" id="modal_edit_device">
                                <div class="modal-dialog" role="document">
                                    <div class="modal-content">
                                        <div class="modal-header header-color">
                                            <h4 class="modal-title">Edit Device</h4>
                                            <button class="btn-close" type="button" aria-label="Close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body">
                                            <form id="edit-device-form">
                                                <div class="mb-3">
                                                    <div class="row">
                                                        <div class="col"><label class="form-label">Device Model:</label>
                                                            <select class="form-select" name="deviceModel" disabled>
                                                                <option value="1" selected>RFTC-8</option>
                                                                <option value="2">RFATV-8</option>
                                                            </select></div>
                                                    </div>
                                                </div>
                                                <div class="mb-3">
                                                    <div class="row">
                                                        <div class="col"><label class="form-label">DEV EUI:</label><input class="form-control" type="text" value="00F41A" name="dev_eui"></div>
                                                    </div>
                                                </div>
                                                <div class="mb-3">
                                                    <div class="row">
                                                        <div class="col"><label class="form-label">Description:</label><input class="form-control" type="text" value="Room 1" name="description"></div>
                                                    </div>
                                                </div>
                                                <div class="mb-3 hidden" name="rfatvSettings">
                                                    <label class="form-label fs-5 fw-bold mb-3">RFATV Settings</label>
                                                     <div class="mb-3">
                                                        <div class="row">
                                                            <div class="col">
                                                                <label class="form-label">Heating</label>
                                                                <select class="form-select" name="heating">
                                                                    <option value="1" selected>Enabled</option>
                                                                    <option value="2">Disabled - valve closed</option>
                                                                    <option value="3">Disabled - valve open</option>
                                                                </select>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div name="heatingSettings">
                                                    <div class="mb-3">
                                                        <div class="row">
                                                            <div class="col"><label class="form-label">Refresh time [min]</label><input class="form-control" type="number" min="0.5" step="0.5" name="refresh_interval"></div>
                                                            <div class="col"><label class="form-label">Temperature hysteresis [°C]</label><input class="form-control" type="number"  min="0" max="20" step="0.1" name="temperature_hysteresis"></div>
                                                        </div>
                                                    </div>
                                                        <div class="mb-3">
                                                            <div class="row">
                                                                <div class="col">
                                                                     <div class="form-check"><input class="form-check-input" type="checkbox" id="edit-device-freezingDetection" name="freezingDetection"><label class="form-check-label" for="edit-device-freezingDetection">Freezing detection</label></div>
                                                                 </div>
                                                              </div>
                                                      </div>
                                                    <div class="mb-3" name="freezingDetectionDiv">
                                                        <div class="row">
                                                            <div class="col"><label class="form-label">Freezing temperature [°C]</label><input class="form-control" type="number"  min="0" max="20" step="0.1" name="freezing_temperature"></div>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <div class="mb-3">
                                                            <div class="row">
                                                                <div class="col">
                                                                    <div class="form-check"><input class="form-check-input" type="checkbox" id="edit-device-windowDetection" name="windowDetection"><label class="form-check-label" for="edit-device-windowDetection">Window detection</label></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="hidden" name="windowDetectionDiv">
                                                            <div class="row">
                                                                <div class="col"><label class="form-label">Window sensitivity [°C]</label><input class="form-control" type="number"  min="0" max="20" step="0.1" name="window_sensitivity"></div>
                                                                <div class="col"><label class="form-label">Delay [min]</label><input class="form-control" type="number"  min="0" step="0.5" name="window_time"></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    </div>
                                                </div>
                                            </form>
                                        </div>
                                        <div class="modal-footer">
                                            <button class="btn btn-light" type="button" data-bs-dismiss="modal">Close</button>
                                            <button class="btn btn-primary" type="submit" id="device-edit-submit-btn">Edit</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Delete Device Modal -->
                            <div class="modal fade" role="dialog" tabindex="-1" id="modal_delete_device">
                                <div class="modal-dialog" role="document">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h4 class="modal-title">Delete Device</h4>
                                            <button class="btn-close" type="button" aria-label="Close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body">
                                            <h5 class="text-center">Are you sure?</h5>
                                        </div>
                                        <div class="modal-footer">
                                            <button class="btn btn-light" type="button" data-bs-dismiss="modal">Close</button>
                                            <button class="btn btn-danger btn-delete" type="button" data-bs-dismiss="modal">Delete</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="fixed-add-button">
        <button class="btn btn-primary btn-sm border rounded-pill btn-circle" type="button" data-bs-toggle="modal" data-bs-target="#modal_add_device">
            <img src="assets/img/plus-icon-inactive.svg" style="width: 28px;">
            <span class="add-text">Add</span>
        </button>
